<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8f8f8;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: #222;
            color: #fff;
        }
        .login {
            font-size: 1rem;
        }
        .cart {
            position: relative;
            font-size: 1rem;
            cursor: pointer;
        }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #e74c3c;
            color: #fff;
            border-radius: 50%;
            padding: 2px 7px;
            font-size: 0.8rem;
        }
        main {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }
        .product {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 1rem;
            text-align: center;
        }
        .product img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 1rem;
        }
        .product button {
            background: #222;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .product button:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <header>
        <div class="login">
            <a href="#" style="color: #fff; text-decoration: none;">Login</a>
        </div>
        <div class="cart" id="cart">
            🛒 Cart <span class="cart-count" id="cart-count">0</span>
        </div>
    </header>
    <main>
        <div class="product">
            <img src="https://via.placeholder.com/100" alt="Product 1">
            <h3>Product 1</h3>
            <p>$10.00</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/100" alt="Product 2">
            <h3>Product 2</h3>
            <p>$15.00</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/100" alt="Product 3">
            <h3>Product 3</h3>
            <p>$20.00</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>
    </main>
    <script>
        let cartCount = 0;
        function addToCart() {
            cartCount++;
            document.getElementById('cart-count').textContent = cartCount;
        }
    </script>
</body>
</html>
